name: Website Screenshot

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL to capture'
        required: true
      width:
        description: 'Viewport width'
        required: false
        default: '1920'
      height:
        description: 'Viewport height'
        required: false
        default: '1080'
      request_id:
        description: 'Request ID'
        required: true

jobs:
  screenshot:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/puppeteer/puppeteer:21.6.1
      options: --user root
    
    steps:
        
      - name: Capture Screenshot
        run: |
          cat > capture.js << 'EOF'
          const puppeteer = require('puppeteer');
          const fs = require('fs');
          
          (async () => {
            try {
              console.log('Launching browser...');
              const browser = await puppeteer.launch({
                headless: true,
                args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-dev-shm-usage']
              });
              
              console.log('Creating new page...');
              const page = await browser.newPage();
              
              console.log('Setting viewport...');
              await page.setViewport({ 
                width: parseInt(process.env.WIDTH), 
                height: parseInt(process.env.HEIGHT)
              });
              
              console.log('Navigating to URL:', process.env.URL);
              await page.goto(process.env.URL, { 
                waitUntil: 'networkidle2',
                timeout: 30000
              });
              
              console.log('Waiting for page to settle...');
              await new Promise(resolve => setTimeout(resolve, 2000));
              
              console.log('Taking screenshot...');
              const screenshot = await page.screenshot({ encoding: 'base64' });
              
              await browser.close();
              
              console.log('Saving screenshot...');
              fs.mkdirSync('output', { recursive: true });
              fs.writeFileSync('output/screenshot.txt', screenshot);
              
              console.log('Screenshot captured successfully!');
              process.exit(0);
            } catch (error) {
              console.error('Error capturing screenshot:', error);
              process.exit(1);
            }
          })();
          EOF
          
          URL="${{ inputs.url }}" WIDTH="${{ inputs.width }}" HEIGHT="${{ inputs.height }}" node capture.js
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-${{ inputs.request_id }}
          path: output/screenshot.txt
          retention-days: 1
